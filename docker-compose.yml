services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: autoadvisor_postgres
    restart: always
    environment:
      POSTGRES_USER: autoadvisor
      POSTGRES_PASSWORD: autoadvisor123
      POSTGRES_DB: autoadvisor_db
    ports:
      - "5432:5432"
    volumes:
      - autoadvisor_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autoadvisor_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  autoadvisor_pgdata: